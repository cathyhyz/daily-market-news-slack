# Weekday digest: NewsAPI -> Gemini -> Slack webhook.
# Cron is UTC; see README for US Eastern/Pacific equivalents.
name: Daily market news

on:
  workflow_dispatch:
  schedule:
    # 14:00 UTC Mon-Fri ≈ 09:00 US/Eastern during standard time (EST).
    # For EDT (daylight), use 13:00 UTC; for other zones, adjust README + this line.
    - cron: "0 14 * * 1-5"

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market news pipeline
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: PYTHONPATH=src python -m market_news
